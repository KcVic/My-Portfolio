{% extends 'base.html' %}

{% block content %}
<!-- Hero Section -->
<section class="min-vh-100 d-flex align-items-center position-relative overflow-hidden pt-5">
    <!-- Abstract Backgrounds (simulated with CSS) -->
    <div class="position-absolute rounded-circle" style="top: 20%; left: 10%; width: 280px; height: 280px; background: rgba(16, 185, 129, 0.1); filter: blur(60px); animation: pulse 2s infinite;"></div>
    <div class="position-absolute rounded-circle" style="bottom: 20%; right: 10%; width: 380px; height: 380px; background: rgba(99, 102, 241, 0.1); filter: blur(60px); animation: pulse 2s infinite 1s;"></div>

    <div class="container text-center position-relative z-3 mt-5">
        <div class="d-inline-block px-3 py-1 mb-4 text-emerald-400 text-uppercase small fw-semibold rounded-pill" style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); letter-spacing: 1px;">
            Full Stack Developer
        </div>
        <h1 class="display-3 fw-bold text-light mb-4" style="letter-spacing: -1px;">
            Building digital experiences that <span class="gradient-text">matter.</span>
        </h1>
        <p class="fs-5 text-slate-400 mb-5 mx-auto lh-lg" style="max-width: 650px;">
            I craft accessible, pixel-perfect, and performant web applications. 
            Focusing on clean code and elegant design.
        </p>
        <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
            <a href="{% url 'projects' %}" class="btn bg-emerald-500 fw-semibold px-4 py-3 border-0 d-inline-flex align-items-center justify-content-center gap-2 hover-scale">
                View My Work <i class="bi bi-arrow-right"></i>
            </a>
            <a href="{% url 'about' %}" class="btn text-light fw-semibold px-4 py-3 border-slate-800" style="background-color: #1e293b;">
                More About Me
            </a>
        </div>
    </div>
    
    <div class="position-absolute bottom-0 start-50 translate-middle-x mb-5 text-secondary">
        <i class="bi bi-chevron-down fs-3"></i>
    </div>
</section>

<style>
    @keyframes pulse {
        0% { opacity: 0.5; }
        50% { opacity: 1; }
        100% { opacity: 0.5; }
    }
</style>
{% endblock %}
